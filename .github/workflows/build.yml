name: Build

# Rolling release: the standalone binaries for macOS, Linux and Windows are
# rebuilt and republished under the "rolling" release AT MOST ONCE PER DAY.
# A push only triggers a rebuild if the last rolling build is ≥23h old; a daily
# schedule catches any changes that were throttled; a manual run always builds.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    name: Rate-limit to once per day
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # A manual run always rebuilds.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — building."
            exit 0
          fi
          # Otherwise, only rebuild if the rolling release is missing or ≥23h old.
          ts=$(gh release view rolling --json publishedAt -q .publishedAt 2>/dev/null || echo "")
          if [ -z "$ts" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "No rolling release yet — building."
            exit 0
          fi
          age_h=$(( ( $(date -u +%s) - $(date -u -d "$ts" +%s) ) / 3600 ))
          if [ "$age_h" -ge 23 ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Last rolling build was ${age_h}h ago — building."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Last rolling build was ${age_h}h ago (<23h) — skipping to stay at once/day."
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: gate
    if: needs.gate.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: hearthdelve-linux
            bin: dist/hearthdelve
          - os: macos-latest
            asset: hearthdelve-macos
            bin: dist/hearthdelve
          - os: windows-latest
            asset: hearthdelve-windows.exe
            bin: dist/hearthdelve.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build standalone binary
        run: pyinstaller --noconfirm --onefile --name hearthdelve --collect-all tcod play.py

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.bin }}" "out/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

  release:
    name: Publish rolling release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Replace the previous rolling release so it always points at the
          # latest commit and carries only the freshest binaries.
          gh release delete rolling --cleanup-tag --yes || true
          gh release create rolling \
            --target "${{ github.sha }}" \
            --title "Rolling build" \
            --notes "Automated build from the latest push to \`main\` (commit ${{ github.sha }}). Refreshed at most once per day.

          Download the binary for your OS below — no Python needed.

          * **Linux** — \`hearthdelve-linux\` (\`chmod +x\` then run in a terminal)
          * **macOS** — \`hearthdelve-macos\` (\`chmod +x\`; first run: right-click → Open, or \`xattr -dr com.apple.quarantine hearthdelve-macos\` to clear Gatekeeper)
          * **Windows** — \`hearthdelve-windows.exe\`

          Runs in a terminal window. Save lives at \`~/.hearthdelve_save.json\`." \
            --prerelease \
            $(find artifacts -type f)
