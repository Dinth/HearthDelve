name: Build

# Rolling release: the standalone binaries for macOS, Linux and Windows are
# rebuilt and republished under the "rolling" release AT MOST ONCE PER DAY.
# A push only triggers a rebuild if the last rolling build is ≥23h old; a daily
# schedule catches any changes that were throttled; a manual run always builds.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Tests run on EVERY push (never throttled) — a broken save format or a
  # disconnected dungeon can never reach the rolling release.
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run the suite
        run: python -m unittest discover -s tests -v

  gate:
    name: Rate-limit to once per day
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # A manual run always rebuilds.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — building."
            exit 0
          fi
          # Otherwise, only rebuild if the rolling release is missing or ≥23h old.
          ts=$(gh release view rolling --json publishedAt -q .publishedAt 2>/dev/null || echo "")
          if [ -z "$ts" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "No rolling release yet — building."
            exit 0
          fi
          age_h=$(( ( $(date -u +%s) - $(date -u -d "$ts" +%s) ) / 3600 ))
          if [ "$age_h" -ge 23 ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Last rolling build was ${age_h}h ago — building."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Last rolling build was ${age_h}h ago (<23h) — skipping to stay at once/day."
          fi

  # macOS — BOTH chips (macos-latest is Apple-Silicon-only since macos-14, so an
  # Intel build on macos-13 keeps 2020-and-earlier Macs covered) — and Windows
  # (onedir → zip, to dodge the %TEMP% self-extract that antivirus blocks with
  # 'error 5').
  build:
    name: Build (${{ matrix.os }})
    needs: [gate, test]
    if: needs.gate.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build (macOS — arm64 on macos-latest, intel on macos-13)
        if: runner.os == 'macOS'
        run: |
          FONT=(); [ -f hearthdelve/assets/font.ttf ] && FONT=(--add-data "hearthdelve/assets/font.ttf:hearthdelve/assets")
          pyinstaller --noconfirm --onefile --name hearthdelve --collect-all tcod "${FONT[@]}" play.py
          ARCH=$([ "$RUNNER_ARCH" = "ARM64" ] && echo arm64 || echo intel)
          mkdir -p out && cp dist/hearthdelve "out/hearthdelve-macos-$ARCH"

      - name: Build (Windows — folder, zipped)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          FONT=(); [ -f hearthdelve/assets/font.ttf ] && FONT=(--add-data "hearthdelve/assets/font.ttf;hearthdelve/assets")
          pyinstaller --noconfirm --onedir --name hearthdelve --collect-all tcod "${FONT[@]}" play.py
          mkdir -p out
          powershell -Command "Compress-Archive -Path dist/hearthdelve/* -DestinationPath out/hearthdelve-windows.zip -Force"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: out/*

  # Linux: build INSIDE a Debian 11 container (glibc 2.31), not on the runner's
  # own OS — a PyInstaller onefile needs the build host's glibc or newer at
  # runtime, so the older the build floor, the wider the audience: this covers
  # Debian 11+, Ubuntu 20.04+, RHEL/Alma/Rocky 9+, and everything since. It also
  # unpins us from any particular runner image's retirement schedule.
  build-linux:
    name: Build (Linux)
    needs: [gate, test]
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          FONT=(); [ -f hearthdelve/assets/font.ttf ] && FONT=(--add-data "hearthdelve/assets/font.ttf:hearthdelve/assets")
          pyinstaller --noconfirm --onefile --name hearthdelve --collect-all tcod "${FONT[@]}" play.py
          mkdir -p out && cp dist/hearthdelve out/hearthdelve-linux
      - name: Prove the glibc floor
        run: |
          echo "Container glibc:" && ldd --version | head -1
          python -c "print('binary present:', __import__('os').path.getsize('out/hearthdelve-linux'))"
      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: out/*

  release:
    name: Publish rolling release
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Replace the previous rolling release so it always points at the
          # latest commit and carries only the freshest binaries.
          gh release delete rolling --cleanup-tag --yes || true
          gh release create rolling \
            --target "${{ github.sha }}" \
            --title "Rolling build" \
            --notes "Automated build from the latest push to \`main\` (commit ${{ github.sha }}). Refreshed at most once per day.

          Download the build for your OS below — no Python needed.

          * **Linux** — \`hearthdelve-linux\` (x86-64, glibc 2.31+: Debian 11+, Ubuntu 20.04+, RHEL/Alma/Rocky 9+, or newer; \`chmod +x\` then run in a terminal)
          * **macOS (Apple Silicon: M1 and later)** — \`hearthdelve-macos-arm64\`
          * **macOS (Intel: ~2020 and earlier)** — \`hearthdelve-macos-intel\`
            (either Mac build: \`chmod +x\`; first run right-click → Open, or \`xattr -dr com.apple.quarantine <file>\` to clear Gatekeeper)
          * **Windows** — \`hearthdelve-windows.zip\` (64-bit Windows 10+; unzip, then run \`hearthdelve.exe\` inside the folder)

          Runs in a terminal window. Save lives at \`~/.hearthdelve_save.json\`." \
            --prerelease \
            $(find artifacts -type f)
